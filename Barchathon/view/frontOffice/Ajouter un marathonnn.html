<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter un marathon</title>
    <style>
        :root {
            --ink: #102a43;
            --teal: #0f766e;
            --bg: #f8fcfc;
            --card: #ffffff;
            --sand: #fff8e7;
            --slate: #627d98;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", sans-serif;
            color: var(--ink);
            background: linear-gradient(180deg, var(--sand), var(--bg));
            min-height: 100vh;
        }
        .wrap { width: min(960px, calc(100% - 32px)); margin: 0 auto; padding: 32px 0 46px; }
        
        /* Panneau blanc avec arrondis de 28px */
        .panel { 
            background: var(--card); 
            border-radius: 28px; 
            padding: 30px; 
            box-shadow: 0 18px 40px rgba(16, 42, 67, 0.08); 
            border: 1px solid rgba(16, 42, 67, 0.08); 
        }

        h1 { margin-top: 0; font-size: 2.2rem; margin-bottom: 10px; }
        .lead { color: var(--slate); line-height: 1.7; margin-bottom: 24px; }

        /* Grille identique à "Modifier" */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, minmax(0, 1fr)); 
            gap: 18px; 
        }

        .field { display: grid; gap: 8px; }
        label { font-weight: 700; font-size: 0.95rem; }

        input { 
            width: 100%; 
            border-radius: 14px; 
            border: 1px solid #cbd5e1; 
            padding: 12px 14px; 
            font: inherit; 
        }

        /* Style des boutons identiques */
        .actions { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin-top: 26px; 
        }

        .btn { 
            text-decoration: none; 
            border: 0; 
            border-radius: 14px; 
            padding: 12px 18px; 
            font-weight: 700; 
            cursor: pointer; 
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-primary { background: var(--teal); color: white; }
        .btn-secondary { background: #edf2f7; color: var(--ink); }
        
        .btn:hover { opacity: 0.9; }

        @media (max-width: 700px) { 
            .grid { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="panel">
            <h1>Ajouter un marathon</h1>
            <p class="lead">Cette page permet à l'administrateur de créer un marathon avec les informations principales.</p>

            <form action="addMarathon.php" method="post" enctype="multipart/form-data">
                <div class="grid">

                    <div class="field">
                        <label for="ID_Marathon">ID du marathon</label>
                        <input type="number" id="ID_Marathon" name="ID_Marathon" placeholder="Ex: 1" required>
                    </div>

                    <div class="field">
                        <label for="Nom_Marathon">Nom du marathon</label>
                        <input type="text" id="Nom_Marathon" name="Nom_Marathon" placeholder="Nom de l'événement" required>
                    </div>

                    <div class="field">
                        <label for="Région_Marathon">Région</label>
                        <input type="text" id="Région_Marathon" name="Région_Marathon" placeholder="Ex: Tunis" required>
                    </div>

                    <div class="field">
                        <label for="Date_Marathon">Date</label>
                        <input type="date" id="Date_Marathon" name="Date_Marathon" required>
                    </div>

                    <div class="field">
                        <label for="places">Places disponibles</label>
                        <input type="number" id="places" name="places" min="1" placeholder="Ex: 240" required>
                    </div>

                    <div class="field">
                        <label for="organisateur">Organisateur</label>
                        <input type="text" id="organisateur" name="organisateur" placeholder="Nom de l'organisation" required>
                    </div>

                    <div class="field">
                        <label for="Prix">Prix inscription (TND)</label>
                        <input type="number" id="Prix" name="Prix" min="0" step="1" placeholder="Ex: 65" required>
                    </div>

                    <div class="field">
                        <label for="photo">Photo du marathon</label>
                        <input type="file" id="photo" name="photo" accept=".jpg,.jpeg,.png,.webp">
                    </div>

                </div>

                <div class="actions">
                    <button type="submit" class="btn btn-primary">Enregistrer</button>
                    <a href="manageDraftSponsors.php" class="btn btn-secondary">Ajouter des sponsors</a>
                    <a href="listMarathons.php" class="btn btn-secondary">Retour dashboard</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
