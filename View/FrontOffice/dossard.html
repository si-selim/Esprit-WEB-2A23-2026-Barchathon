<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dossard - Marathon</title>
    <link rel="stylesheet" href="dossard.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand">
                <span class="brand-mark">BT</span>
                <div>
                    <strong>BarchaThon</strong>
                    <small>Front Office</small>
                </div>
            </div>
            <nav class="nav-links">
                <a href="index.php">Accueil</a>
                <a href="listMarathons.php">Catalogue</a>
                <a href="inscription.html" class="active">Inscription</a>
                <a href="afficher.html">Afficher Tout</a>
            </nav>
            <div class="user-badge">Participant Demo</div>
        </header>

        <main class="content-grid">
            <section class="card card-form">
                <div class="card-title">
                    <div>
                        <h1>Dossard</h1>
                        <p>Attribuez un dossard et gérez les informations du participant.</p>
                    </div>
                </div>

                <form method="post">
                    <div class="form-grid">
                        <div class="field-group">
                            <label for="numero">Numéro du dossard</label>
                            <input id="numero" type="number" name="numero" min="1" placeholder="Ex : 1234" required>
                        </div>

                        <div class="field-group">
                            <label for="taille">Taille du dossard</label>
                            <select id="taille" name="taille" required>
                                <option value="">Choisir une taille</option>
                                <option value="S">S</option>
                                <option value="M">M</option>
                                <option value="L">L</option>
                                <option value="XL">XL</option>
                            </select>
                        </div>

                        <div class="field-group">
                            <label for="date_attribution">Date d'attribution</label>
                            <input id="date_attribution" type="date" name="date_attribution" required>
                        </div>
                    </div>

                    <div class="add-button-row">
                        <button class="btn btn-primary" type="submit">Ajouter dossard</button>
                    </div>

                    <div class="search-row">
                        <input id="search_numero" type="number" name="search_numero" min="1" placeholder="Chercher par numéro">
                        <button class="btn btn-secondary" type="button">Rechercher</button>
                    </div>

                    <div class="action-buttons">
                        <button class="btn btn-outlined" type="button">Modifier</button>
                        <button class="btn btn-danger" type="button">Supprimer</button>
                    </div>
                </form>

                <div class="recent-card">
                    <div class="recent-header">
                        <h2>Dossards récents</h2>
                    </div>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Numéro</th>
                                    <th>Taille</th>
                                    <th>Date attribution</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td>1234</td>
                                    <td>M</td>
                                    <td>2026-04-01</td>
                                </tr>
                                <tr>
                                    <td>1235</td>
                                    <td>L</td>
                                    <td>2026-04-02</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
